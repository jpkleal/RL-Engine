[runner]
host = "127.0.0.1"
port = 10003
connect_timeout = 5.0
ack_timeout = 5.0

[training]
algorithm = "ppo"        # "sac" or "ppo"
role_ids = ["striker", "goalkeeper"]
state_dim = 16
action_dim = 4
rollout_batch_size = 32
save_every_n_epochs = 10
test_case = "SHOOTOUT"
input_module = "NeonFC"

[sac]
hidden_sizes = [256, 256]
actor_lr = 3e-4
critic_lr = 3e-4
alpha_lr = 3e-4
gamma = 0.99
tau = 0.005
initial_alpha = 0.2
auto_alpha = true
replay_capacity = 200_000
min_buffer_size = 1_000
batch_size = 256

[ppo]
hidden_sizes = [256, 256]
lr = 3e-4
gamma = 0.99
gae_lambda = 0.95
clip_eps = 0.2
epochs = 10
minibatch_size = 64
entropy_coef = 0.01
value_coef = 0.5

[paths]
save_dir = "runs/training"
log_dir  = "runs/tensorboard"